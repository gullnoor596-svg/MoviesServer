<!DOCTYPE html>
<html>
<head>
    <title>Hollywood Movie Store</title>
    <style>
        body { margin:0; font-family:Arial; background:#111; color:white; }
        h1 { text-align:center; padding:15px; background:black; }
        .search-container { text-align:center; margin:15px; }
        .search-container input { padding:10px; width:250px; font-size:14px; border-radius:5px; border:none; }
        .grid { display:flex; flex-wrap:wrap; gap:10px; padding:10px; }
        /* 4 movies per row */
        .movie {
            flex: 0 0 calc(25% - 10px);
            box-sizing: border-box;
            background:#222;
            border-radius:10px;
            overflow:hidden;
            text-align:center;
            margin-bottom:10px;
        }
        .movie img { width:100%; height:200px; object-fit:cover; }
        .movie h3 { margin:5px; font-size:14px; }
        .download { display:block; background:#00ff88; color:black; padding:8px; text-decoration:none; font-weight:bold; }
        /* Responsive: 1 per row on small screens, 2 per row on medium */
        @media(max-width:900px){ .movie { flex:0 0 calc(50% - 10px); } }
        @media(max-width:600px){ .movie { flex:0 0 100%; } }
    </style>
</head>
<body>

<h1>🎬 Hollywood Movies</h1>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search movies...">
</div>

<div class="grid" id="movieGrid"></div>

<script>
const TOTAL_MOVIES = 15000; // You can increase to 30000
const LOAD_COUNT = 50; // Movies loaded per batch
let allMovies = [];
let filteredMovies = [];
let loadedCount = 0;

// Manual movies
let manualMovies = [
    { name: "Hollywood 1", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood1.mp4" },
    { name: "Hollywood 2", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood2.mp4" },
    { name: "Hollywood 3", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood3.mp4" },
    { name: "Hollywood 4", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood4.mp4" }
];

// Auto-generate rest
for(let i=5;i<=TOTAL_MOVIES;i++){
    manualMovies.push({
        name:`Hollywood ${i}`,
        img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg",
        link:`videos/hollywood${i}.mp4`
    });
}

allMovies = manualMovies;
filteredMovies = allMovies;

let grid = document.getElementById("movieGrid");

// Function to load next batch
function loadMovies(){
    const nextBatch = filteredMovies.slice(loadedCount, loadedCount + LOAD_COUNT);
    nextBatch.forEach(m=>{
        let box = document.createElement("div");
        box.className = "movie";
        box.innerHTML = `
            <img src="${m.img}" alt="${m.name}">
            <h3>${m.name}</h3>
            <a class="download" href="${m.link}" target="_blank">Download</a>
        `;
        grid.appendChild(box);
    });
    loadedCount += nextBatch.length;
}

// Infinite scroll
window.addEventListener("scroll", ()=>{
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500){
        if(loadedCount < filteredMovies.length) loadMovies();
    }
});

// Search functionality
document.getElementById("searchInput").addEventListener("input",(e)=>{
    const query = e.target.value.toLowerCase();
    filteredMovies = allMovies.filter(m=>m.name.toLowerCase().includes(query));
    grid.innerHTML = "";
    loadedCount = 0;
    loadMovies();
});

// Initial load
loadMovies();
</script>

</body>
</html>
