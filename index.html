<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝗚𝗨𝗟𝗟𝗞𝗛𝗔𝗡 𝗪𝗘𝗕 𝗦𝗘𝗥𝗩𝗘𝗥</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
/* ===== BODY ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:#fff;
    overflow-x:hidden;
}

/* ===== NAVIGATION DRAWER ===== */
.drawer{
    position:fixed;
    top:0;
    left:0;
    width:0; 
    height:40%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(12px);
    overflow:hidden;
    z-index:1000;
    transition:width 0.4s ease;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:20px;
    padding-left:1px;
    border-radius:0 25px 25px 0;
}
.drawer::before{
    content:"";
    position:absolute;
    inset:0;
    padding:3px;
    border-radius:0 25px 25px 0;
    background:linear-gradient(270deg,#00ff88,#00ccff,#ff00ff,#00ff88);
    background-size:600% 600%;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    animation:borderMove 6s linear infinite;
}
@keyframes borderMove{
    0%{background-position:0% 0;}
    100%{background-position:200% 0;}
}
.drawer a{
    padding:15px 20px;
    font-size:30px;
    color:#00ff88;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:15px;
    border-radius:12px;
    transition:0.3s;
    position:relative;
}
.drawer a:hover{
    color:#fff;
    background:rgba(0,255,136,0.2);
    transform:translateX(10px);
    box-shadow:0 0 15px #00ff88;
}
.drawer a::after{
    content:"";
    position:absolute;
    left:20px;
    bottom:8px;
    width:0%;
    height:2px;
    background:#00ff88;
    transition:0.3s;
}
.drawer a:hover::after{width:60%;}
.drawer .closebtn{
    position:absolute;
    top:15px;
    right:25px;
    font-size:40px;
    color:#00ff88;
    cursor:pointer;
    transition:0.3s;
}
.drawer .closebtn:hover{
    color:#fff;
    transform:rotate(90deg) scale(1.2);
}

/* OPEN DRAWER BUTTON */
#openDrawerBtn{
    position:fixed;
    top:15px;
    left:15px;
    font-size:40px;
    background:linear-gradient(45deg,#00ff88,#00ccff);
    color:black;
    padding:12px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    z-index:1001;
    box-shadow:0 0 15px #00ff88;
    transition:0.3s;
}
#openDrawerBtn:hover{
    transform:scale(1.1) rotate(5deg);
    box-shadow:0 0 25px #00ff88,0 0 40px #00ccff;
}

/* ===== TITLE WITH RIGHT-TO-LEFT SHIMMER ===== */
h1{
    text-align:center;
    font-size:60px;
    margin:80px 10px 30px 10px;
}
.rainbow-text {
    display: inline-block;
    font-weight: bold;
    background: linear-gradient(
      90deg,
      red 0%, magenta 15%, blue 30%, cyan 45%, green 60%, yellow 75%, red 100%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
}
@keyframes shimmer{
    0% { background-position: 100% 0; }   /* start at right */
    100% { background-position: -100% 0; } /* move to left */
}

/* SEARCH BAR */
.search-container{text-align:center;margin:20px 0 40px;}
.search-container input{
    width:60%;
    max-width:700px;
    padding:30px;
    font-size:30px;
    border-radius:20px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.05);
    color:#fff;
    text-align:center;
    box-shadow: inset 0 0 10px rgba(0,255,136,0.15);
    transition:0.3s;
}
.search-container input:focus{
    box-shadow: inset 0 0 15px rgba(0,255,136,0.25), 0 0 30px rgba(0,255,136,0.1);
}

/* MOVIE GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
    padding:20px 50px 50px;
}
@media(max-width:900px){.grid{grid-template-columns:1fr;padding:20px;}}

/* MOVIE CARD */
.movie{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    border:2px solid transparent;
    transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    opacity:0;
    transform:translateY(30px);
    position: relative;
}
.movie img{
    width:100%;
    height:700px;
    object-fit:cover;
}
.movie h3{
    margin:10px;
    text-shadow:0 0 5px #00ff88;
}
.movie:hover{
    border:4px solid #00ff88;
    transform:scale(1.05);
    box-shadow:0 0 15px #00ff88;
}
.movie:active, .movie.active-touch{
    transform:scale(0.97);
    box-shadow:0 0 20px #00ff88 inset;
}

/* DOWNLOAD BUTTON */
.download{
    display:block;
    margin:10px;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    background:linear-gradient(90deg,#00ff88,#00cc55);
    color:black;
    text-decoration:none;
    transition:0.2s;
}
.download:active{
    transform:scale(0.95);
    box-shadow:0 0 5px #00ff88 inset;
}

/* ANIMATION */
.fadeIn{animation:fadeUp 0.8s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- DRAWER -->
<div id="myDrawer" class="drawer">
    <a href="javascript:void(0)" class="closebtn" onclick="closeDrawer()">&times;</a>
    <a href="https://www.youtube.com/" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
    <a href="https://www.facebook.com/YourPage" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
    <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
    <a href="https://wa.me/1234567890" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="https://www.tiktok.com/@YourProfile" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
    <a href="#" onclick="shareWebsite()"><i class="fas fa-share-alt"></i> Share</a>
</div>

<button id="openDrawerBtn" onclick="openDrawer()"><i class="fas fa-bars"></i></button>

<!-- Title with Right-to-Left Shimmer -->
<h1 id="title"><span class="rainbow-text">𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕</span></h1>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search movies...">
</div>

<div class="grid" id="movieGrid"></div>

<script>
// Drawer functions
function openDrawer(){document.getElementById("myDrawer").style.width="300px";}
function closeDrawer(){document.getElementById("myDrawer").style.width="0";}

// Share website function
function shareWebsite(){
    const url="https://www.google.com/search?q=github"; 
    if(navigator.share){
        navigator.share({title:"KHAN", url});
    }else{
        prompt("Copy this link to share:", url);
    }
}

// Movies
const TOTAL_MOVIES=500;
const LOAD_COUNT=10;
let allMovies=[], filteredMovies=[], loadedCount=0;

let manualMovies=[
    {name:"Sherk", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Shrek-forever-after-(2010)-hindi-dubbed.jpg", link:"https://flat-sky-e839.xahyrexy.workers.dev/1774713076/AhUOChdfSl8aFBhXXQQEQF8DHEoBB1MUXlVISV1XURVTVUxIAFxRFFlTH0xKF1deDgQMVTcNFxUBPjwVFgATFRg+OxwQABcvWFFLSjstDB4OCCU+EQcHFQ4+PA8ICTo9BRcTHzsnCQU4AAMlTCMMHAcYIBMICQReHAgUU0oIFUQ/Shrek_Forever_After_2010_Hindi_Dubbed_Full_Movie_BluRay.mp4"},
    {name:"Hollywood 2", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood2.mp4"},
    {name:"Hollywood 3", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood3.mp4"},
    {name:"Hollywood 4", img:"https://www.filmyzilla34.com/site_uploads/duplicate/thumb_Ip-man-and-four-kings-(2021)-hindi-dubbed.jpg", link:"videos/hollywood4.mp4"}
];
for(let i=5;i<=TOTAL_MOVIES;i++){
    manualMovies.push({name:`Hollywood ${i}`, img:"https://", link:`videos/hollywood${i}.mp4`});
}
allMovies=manualMovies;
filteredMovies=allMovies;

let grid=document.getElementById("movieGrid");
function loadMovies(){
    const batch=filteredMovies.slice(loadedCount, loadedCount+LOAD_COUNT);
    batch.forEach((m,i)=>{
        let box=document.createElement("div");
        box.className="movie fadeIn";
        box.style.animationDelay=`${i*0.05}s`;
        box.innerHTML=`
            <img src="${m.img}" alt="${m.name}">
            <h3>${m.name}</h3>
            <a class="download" href="${m.link}" target="_blank">Download</a>
        `;
        grid.appendChild(box);
    });
    loadedCount+=batch.length;

    // Mobile touch effect
    const movies = document.querySelectorAll(".movie");
    movies.forEach(movie => {
        movie.addEventListener("touchstart", ()=>{
            movie.classList.add("active-touch");
        });
        movie.addEventListener("touchend", ()=>{
            setTimeout(()=>{movie.classList.remove("active-touch");},200);
        });
    });
}

// Infinite scroll
window.addEventListener("scroll",()=>{
    if(window.innerHeight+window.scrollY>=document.body.offsetHeight-500){
        if(loadedCount<filteredMovies.length) loadMovies();
    }
});

// Search
document.getElementById("searchInput").addEventListener("input",(e)=>{
    let q=e.target.value.toLowerCase();
    filteredMovies=allMovies.filter(m=>m.name.toLowerCase().includes(q));
    grid.innerHTML="";
    loadedCount=0;
    loadMovies();
});

// Initial load
loadMovies();
</script>
</body>
</html>
