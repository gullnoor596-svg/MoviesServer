<!DOCTYPE html>
<html>
<head>
<title>Real Visitor Tracker</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    background: #0a0a0a;
    color: #00ffcc;
    text-align: center;
    font-family: Arial;
}
.box {
    margin-top: 100px;
}
</style>
</head>

<body>

<div class="box">
    <h1>🔥 Visitors Tracker</h1>
    <h2 id="count">Loading...</h2>
</div>

<script>
// 🔑 TUMHARA FIREBASE CONFIG
const firebaseConfig = {
  databaseURL: "https://accountctf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 Unique User ID (same user reload par repeat nahi hoga)
let userId = localStorage.getItem("userId");

if (!userId) {
    userId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);

    // 📥 Firebase me save
    db.ref("visitors/" + userId).set({
        time: new Date().toLocaleString()
    });
}

// 📊 Count show
db.ref("visitors").on("value", (snapshot) => {
    document.getElementById("count").innerText = snapshot.numChildren();
});
</script>

</body>
</html>
