<!DOCTYPE html>
<html>
<head>
<title>Real Visitor Counter</title>
<style>
body {
    background: black;
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<h1>Visitors</h1>
<h2 id="count">0</h2>

<script>
let count = localStorage.getItem("visitCount");

if (!localStorage.getItem("visited")) {
    count = count ? parseInt(count) + 1 : 1;
    localStorage.setItem("visitCount", count);
    localStorage.setItem("visited", "true");
}

document.getElementById("count").innerText = localStorage.getItem("visitCount") || 1;
</script>

</body>
</html>
